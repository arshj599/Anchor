<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anchor Dashboard</title>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Hide default scrollbar */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(148,163,184,0.5); border-radius: 3px; }
  </style>
</head>
<body class="bg-slate-900 text-slate-200">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Icon Component ---
    const Icon = ({ name, className }) => {
      const svgProps = {
        xmlns: "http://www.w3.org/2000/svg",
        width: "24", height: "24", viewBox: "0 0 24 24",
        fill: "none", stroke: "currentColor", strokeWidth: 2,
        strokeLinecap: "round", strokeLinejoin: "round", className
      };
      const paths = {
        Upload: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></>,
        Activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>,
        Anchor: <><circle cx="12" cy="5" r="3"/><line x1="12" y1="22" x2="12" y2="8"/><path d="M5 12H2a10 10 0 0 0 20 0h-3"/></>,
        MapPin: <><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></>,
        AlertTriangle: <><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,
        Clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
        FileText: <><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></>,
        CheckCircle2: <><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></>,
        RotateCcw: <><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></>,
        Crosshair: <><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></>,
        BarChart3: <><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></>
      };
      return <svg {...svgProps}>{paths[name]}</svg>;
    };

    // --- Gait Patterns ---
    const GAIT_PATTERNS = [
      { type:'Overpronation', pressurePoint:'High inner foot & big toe pressure', remediation:'Issue stability orthotics. Advise crew member to rest for 15 mins. Check footwear for inner sole wear.', severity:'High', riskScore:8 },
      { type:'Supination', pressurePoint:'High outer edge pressure', remediation:'Provide cushioned insoles. Ensure boots are fully laced. Monitor for ankle strain.', severity:'Medium', riskScore:5 },
      { type:'Heavy Heel Strike', pressurePoint:'Excessive rear heel pressure', remediation:'Review carrying load. Suggest posture correction and shock-absorbing heel pads.', severity:'Medium', riskScore:4 },
      { type:'Normal Gait', pressurePoint:'Evenly distributed pressure', remediation:'No immediate action required. Continue standard monitoring.', severity:'Low', riskScore:1 },
      { type:'Asymmetrical Stepping', pressurePoint:'Uneven pressure indicating a limp or favoring one side', remediation:'Immediate medical evaluation. Relieve from active physical duty.', severity:'High', riskScore:9 },
      { type:'Shuffling Gait', pressurePoint:'Low heel clearance, high continuous forefoot drag', remediation:'Assess for severe fatigue or restrictive gear. Enforce immediate rest period.', severity:'Medium', riskScore:6 },
      { type:'Forefoot Striking', pressurePoint:'High pressure concentrated entirely on the ball of the foot', remediation:'Check for footwear constraints. Monitor for calf strain and Achilles tension.', severity:'Low', riskScore:3 }
    ];

    const generateMockAnalysis = () => {
      const isNormal = Math.random() > 0.5;
      const basePattern = isNormal ? GAIT_PATTERNS[3] : GAIT_PATTERNS[Math.floor(Math.random()*GAIT_PATTERNS.length)];
      const baseFatigue = basePattern.riskScore + (Math.random()*4-2);
      const fatigueScore = Math.min(10, Math.max(0, Math.round(baseFatigue)));
      return { ...basePattern, fatigueScore };
    };

    function App() {
      // --- State ---
      const [currentFile,setCurrentFile]=useState(null);
      const [isProcessing,setIsProcessing]=useState(false);
      const [pendingAnalysis,setPendingAnalysis]=useState(null);

      const [timerSeconds,setTimerSeconds]=useState(30);
      const [timeLeft,setTimeLeft]=useState(30);
      const [timerActive,setTimerActive]=useState(false);
      const [needsCalibration,setNeedsCalibration]=useState(false);
      const [isCalibrationUpload,setIsCalibrationUpload]=useState(false);

      const [markerPos,setMarkerPos]=useState({x:50,y:50});
      const [isDragging,setIsDragging]=useState(false);
      const mapRef=useRef(null);

      const [logs,setLogs]=useState([]);

      // --- Timer ---
      useEffect(()=>{
        let interval=null;
        if(timerActive && timeLeft>0){
          interval=setInterval(()=>setTimeLeft(t=>t-1),1000);
        } else if(timerActive && timeLeft<=0){
          setTimerActive(false);
          setNeedsCalibration(true);
          setIsCalibrationUpload(true);
        }
        return ()=>clearInterval(interval);
      },[timerActive,timeLeft]);

      const formatTime=seconds=>{
        const m=Math.floor(seconds/60).toString().padStart(2,'0');
        const s=(seconds%60).toString().padStart(2,'0');
        return `${m}:${s}`;
      };

      const startTimer=()=>{
        setTimeLeft(timerSeconds);
        setTimerActive(true);
        setNeedsCalibration(false);
      };

      // --- Map Dragging ---
      const handleMapDown=e=>{setIsDragging(true); updateMarkerPos(e);}
      const handleMapMove=e=>{if(isDragging) updateMarkerPos(e);}
      const handleMapUp=()=>{setIsDragging(false);}
      const updateMarkerPos=e=>{
        if(!mapRef.current) return;
        const rect=mapRef.current.getBoundingClientRect();
        const clientX=e.touches ? e.touches[0].clientX : e.clientX;
        const clientY=e.touches ? e.touches[0].clientY : e.clientY;
        let x=((clientX-rect.left)/rect.width)*100;
        let y=((clientY-rect.top)/rect.height)*100;
        x=Math.max(0,Math.min(100,x));
        y=Math.max(0,Math.min(100,y));
        setMarkerPos({x,y});
      };
      useEffect(()=>{
        document.addEventListener('mouseup',handleMapUp);
        document.addEventListener('touchend',handleMapUp);
        return ()=>{
          document.removeEventListener('mouseup',handleMapUp);
          document.removeEventListener('touchend',handleMapUp);
        }
      },[]);

      // --- File Upload ---
      const handleFileUpload=e=>{
        const file=e.target.files[0];
        if(!file) return;
        setCurrentFile(file);
        setIsProcessing(true);
        setPendingAnalysis(null);
        setTimeout(()=>{setPendingAnalysis(generateMockAnalysis()); setIsProcessing(false);},1500);
      };

      const saveLog=()=>{
        if(!pendingAnalysis) return;
        const newLog={
          id:Date.now(),
          timestamp:new Date().toLocaleString(),
          fileName:currentFile?.name||'Unknown File',
          isCalibration:isCalibrationUpload,
          analysis:pendingAnalysis,
          location:{...markerPos}
        };
        setLogs([newLog,...logs]);
        setCurrentFile(null);
        setPendingAnalysis(null);
        if(isCalibrationUpload){
          setIsCalibrationUpload(false);
          setNeedsCalibration(false);
          startTimer();
        }
        setMarkerPos({x:50,y:50});
      };

      // --- Analytics ---
      const getZoneData=()=>{
        const zones={Bow:0,Midship:0,Stern:0};
        logs.forEach(log=>{
          if(log.location.y<33) zones.Bow++;
          else if(log.location.y<66) zones.Midship++;
          else zones.Stern++;
        });
        const max=Math.max(...Object.values(zones),1);
        return {zones,max};
      };
      const {zones:zoneCounts,max:maxZoneCount}=getZoneData();
      const getScoreColor=score=>score>=7?'text-red-400':score>=4?'text-amber-400':'text-emerald-400';

      return (
        <div className="min-h-screen p-4">
          <header className="bg-slate-950 p-4 rounded mb-4 flex justify-between items-center">
            <div className="flex items-center space-x-3">
              <div className="bg-cyan-600 p-2 rounded-lg"><Icon name="Anchor" className="w-6 h-6 text-white"/></div>
              <div><h1 className="text-white text-xl font-bold">ANCHOR</h1><p className="text-cyan-400 text-xs uppercase">Gait & Pressure Analytics</p></div>
            </div>
            <div className={`flex items-center space-x-2 px-3 py-2 rounded border ${needsCalibration?'bg-red-900 text-red-200':'bg-slate-800 text-white'}`}>
              <Icon name="Clock" className="w-5 h-5"/>
              <span className="font-mono">{formatTime(timeLeft)}</span>
            </div>
          </header>

          {/* Main content: file upload, analysis summary, map & logs */}
          <div className="grid lg:grid-cols-12 gap-6">
            <div className="lg:col-span-4 space-y-6">
              {/* Calibration Panel */}
              <section className="bg-slate-800 rounded p-4">
                <h2 className="text-white font-semibold mb-2 flex items-center"><Icon name="RotateCcw" className="w-5 h-5 mr-2 text-cyan-400"/>Calibration Schedule</h2>
                <div className="flex justify-between items-center mb-2">
                  <label className="text-slate-400 text-sm">Refresh Interval (Secs)</label>
                  <input type="number" value={timerSeconds} onChange={e=>setTimerSeconds(Number(e.target.value))} className="bg-slate-900 border border-slate-700 rounded px-2 py-1 w-20 text-center" disabled={timerActive}/>
                </div>
                <button onClick={startTimer} className="w-full bg-slate-700 hover:bg-slate-600 rounded py-2 text-white font-medium">{timerActive?'Restart Timer':'Start Timer'}</button>
                {needsCalibration && <p className="text-red-400 mt-2 text-sm">Calibration required! Please upload a new baseline gait file.</p>}
              </section>

              {/* File Upload */}
              <section className={`rounded p-4 ${isCalibrationUpload?'bg-cyan-900/20':'bg-slate-800'}`}>
                <div className="mb-2 flex justify-between items-center"><h2 className="text-white font-semibold flex items-center"><Icon name="Activity" className="w-5 h-5 mr-2 text-cyan-400"/>Data Ingestion</h2>{isCalibrationUpload && <span className="text-xs bg-cyan-600 text-white px-2 py-1 rounded-full">Calibration Mode</span>}</div>
                <div className="border-2 border-dashed border-slate-600 rounded p-4 text-center relative hover:bg-slate-700">
                  <input type="file" accept=".csv" onChange={handleFileUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"/>
                  <Icon name="Upload" className="w-8 h-8 text-slate-400 mx-auto mb-2"/>
                  <p className="text-sm text-slate-300">Drag & Drop CSV or <span className="text-cyan-400">Browse</span></p>
                  <p className="text-xs text-slate-500 mt-1">Pressure sensor readings (.csv)</p>
                </div>
                {currentFile && <div className="mt-2 p-2 bg-slate-900 rounded flex justify-between items-center border border-slate-700"><span>{currentFile.name}</span>{isProcessing?<span className="text-cyan-400">Processing...</span>:<Icon name="CheckCircle2" className="text-emerald-500 w-5 h-5"/>}</div>}
              </section>

              {/* Analysis Summary */}
              {pendingAnalysis && !isProcessing && (
                <section className="bg-slate-800 rounded p-4">
                  <h3 className="text-slate-400 text-xs mb-1">Detected Pattern</h3>
                  <div className={`text-xl font-bold mb-1 ${getScoreColor(pendingAnalysis.riskScore)}`}>{pendingAnalysis.type}</div>
                  <p className="text-sm text-slate-300 mb-1">Risk: {pendingAnalysis.riskScore}/10 Fatigue: {pendingAnalysis.fatigueScore}/10</p>
                  <p className="text-sm text-slate-300 mb-2">{pendingAnalysis.pressurePoint}</p>
                  <p className="text-xs text-slate-400"><Icon name="Crosshair" className="w-4 h-4 mr-1 inline text-cyan-400"/>Drag marker on map and click "Log Event Here".</p>
                </section>
              )}

            </div>

            <div className="lg:col-span-8 space-y-6">
              {/* Map */}
              <section className="bg-slate-800 rounded p-4 flex flex-col h-[400px]">
                <div className="flex justify-between mb-2">
                  <h2 className="text-white font-semibold flex items-center"><Icon name="Crosshair" className="w-5 h-5 mr-2 text-cyan-400"/>Location Designator</h2>
                  <p className="text-slate-400 text-sm">Drag marker to set location</p>
                </div>
                <div className="flex-1 relative bg-slate-900 rounded border overflow-hidden select-none">
                  <div className="absolute inset-0 opacity-20" style={{ backgroundImage:'linear-gradient(#334155 1px, transparent 1px), linear-gradient(90deg, #334155 1px, transparent 1px)', backgroundSize:'20px 20px'}}></div>
                  <div ref={mapRef} className="absolute inset-0 cursor-crosshair" onMouseDown={handleMapDown} onMouseMove={handleMapMove} onTouchStart={handleMapDown} onTouchMove={handleMapMove}>
                    <svg className="w-full h-full">
                      <circle cx={`${markerPos.x}%`} cy={`${markerPos.y}%`} r="10" fill="cyan"/>
                    </svg>
                  </div>
                  <button onClick={saveLog} className="absolute bottom-2 right-2 bg-cyan-600 hover:bg-cyan-500 text-white px-3 py-1 rounded text-sm font-medium">Log Event Here</button>
                </div>
              </section>

              {/* Logs */}
              <section className="bg-slate-800 rounded p-4 overflow-y-auto max-h-[250px] custom-scrollbar">
                <h2 className="text-white font-semibold flex items-center mb-2"><Icon name="FileText" className="w-5 h-5 mr-2 text-cyan-400"/>Event Logs</h2>
                {logs.length===0 && <p className="text-slate-400 text-sm">No logs yet.</p>}
                {logs.map(log=>(
                  <div key={log.id} className="border-b border-slate-700 py-2 text-sm">
                    <div className="flex justify-between"><span>{log.timestamp}</span><span className={getScoreColor(log.analysis.riskScore)}>{log.analysis.type}</span></div>
                    <div className="flex justify-between text-xs text-slate-400"><span>{log.fileName}</span><span>{log.isCalibration?'Calibration':'Data'}</span></div>
                    <div className="text-xs text-slate-400">Location: Bow:{Math.round(log.location.y<33?100:0)}% Midship:{Math.round(log.location.y>=33 && log.location.y<66?100:0)}% Stern:{Math.round(log.location.y>=66?100:0)}%</div>
                  </div>
                ))}
              </section>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
