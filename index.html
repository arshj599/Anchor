<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anchor Dashboard</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for in-browser JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Custom Icons (Replacing lucide-react for standalone HTML compatibility) ---
        const Icon = ({ name, className }) => {
            const svgProps = {
                xmlns: "http://www.w3.org/2000/svg",
                width: "24", height: "24", viewBox: "0 0 24 24",
                fill: "none", stroke: "currentColor", strokeWidth: "2",
                strokeLinecap: "round", strokeLinejoin: "round", className
            };

            const paths = {
                Upload: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></>,
                Activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>,
                Anchor: <><circle cx="12" cy="5" r="3"/><line x1="12" y1="22" x2="12" y2="8"/><path d="M5 12H2a10 10 0 0 0 20 0h-3"/></>,
                MapPin: <><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></>,
                AlertTriangle: <><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,
                Clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
                FileText: <><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></>,
                CheckCircle2: <><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></>,
                RotateCcw: <><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></>,
                Crosshair: <><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></>,
                BarChart3: <><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></>
            };

            return <svg {...svgProps}>{paths[name]}</svg>;
        };

        // --- Mock Data & Helpers ---
        const GAIT_PATTERNS = [
            { 
                type: 'Overpronation', 
                pressurePoint: 'High inner foot & big toe pressure',
                remediation: 'Issue stability orthotics. Advise crew member to rest for 15 mins. Check footwear for inner sole wear.',
                severity: 'High',
                riskScore: 8
            },
            { 
                type: 'Supination', 
                pressurePoint: 'High outer edge pressure',
                remediation: 'Provide cushioned insoles. Ensure boots are fully laced. Monitor for ankle strain.',
                severity: 'Medium',
                riskScore: 5
            },
            { 
                type: 'Heavy Heel Strike', 
                pressurePoint: 'Excessive rear heel pressure',
                remediation: 'Review carrying load. Suggest posture correction and shock-absorbing heel pads.',
                severity: 'Medium',
                riskScore: 4
            },
            { 
                type: 'Normal Gait', 
                pressurePoint: 'Evenly distributed pressure',
                remediation: 'No immediate action required. Continue standard monitoring.',
                severity: 'Low',
                riskScore: 1
            },
            { 
                type: 'Asymmetrical Stepping', 
                pressurePoint: 'Uneven pressure indicating a limp or favoring one side',
                remediation: 'Immediate medical evaluation. Relieve from active physical duty.',
                severity: 'High',
                riskScore: 9
            },
            { 
                type: 'Shuffling Gait', 
                pressurePoint: 'Low heel clearance, high continuous forefoot drag',
                remediation: 'Assess for severe fatigue or restrictive gear. Enforce immediate rest period.',
                severity: 'Medium',
                riskScore: 6
            },
            { 
                type: 'Forefoot Striking', 
                pressurePoint: 'High pressure concentrated entirely on the ball of the foot',
                remediation: 'Check for footwear constraints. Monitor for calf strain and Achilles tension.',
                severity: 'Low',
                riskScore: 3
            }
        ];

        const generateMockAnalysis = () => {
            const isNormal = Math.random() > 0.5; 
            const basePattern = isNormal ? GAIT_PATTERNS[3] : GAIT_PATTERNS[Math.floor(Math.random() * GAIT_PATTERNS.length)];
            const baseFatigue = basePattern.riskScore + (Math.random() * 4 - 2);
            const fatigueScore = Math.min(10, Math.max(0, Math.round(baseFatigue)));
            return { ...basePattern, fatigueScore };
        };

        function App() {
            // --- State ---
            const [currentFile, setCurrentFile] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);
            const [pendingAnalysis, setPendingAnalysis] = useState(null);
            
            const [timerSeconds, setTimerSeconds] = useState(30);
            const [timeLeft, setTimeLeft] = useState(30);
            const [timerActive, setTimerActive] = useState(false);
            const [needsCalibration, setNeedsCalibration] = useState(false);
            const [isCalibrationUpload, setIsCalibrationUpload] = useState(false);

            const [markerPos, setMarkerPos] = useState({ x: 50, y: 50 });
            const [isDragging, setIsDragging] = useState(false);
            const mapRef = useRef(null);

            const [logs, setLogs] = useState([]);

            // --- Timer Logic ---
            useEffect(() => {
                let interval = null;
                if (timerActive && timeLeft > 0) {
                    interval = setInterval(() => {
                        setTimeLeft(time => time - 1);
                    }, 1000);
                } else if (timerActive && timeLeft <= 0) {
                    setTimerActive(false);
                    setNeedsCalibration(true);
                    setIsCalibrationUpload(true);
                }
                return () => clearInterval(interval);
            }, [timerActive, timeLeft]);

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            const startTimer = () => {
                setTimeLeft(timerSeconds);
                setTimerActive(true);
                setNeedsCalibration(false);
            };

            // --- Map Dragging Logic ---
            const handleMapDown = (e) => {
                setIsDragging(true);
                updateMarkerPos(e);
            };

            const handleMapMove = (e) => {
                if (isDragging) updateMarkerPos(e);
            };

            const handleMapUp = () => {
                setIsDragging(false);
            };

            const updateMarkerPos = (e) => {
                if (!mapRef.current) return;
                const rect = mapRef.current.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                let x = ((clientX - rect.left) / rect.width) * 100;
                let y = ((clientY - rect.top) / rect.height) * 100;
                
                x = Math.max(0, Math.min(100, x));
                y = Math.max(0, Math.min(100, y));
                
                setMarkerPos({ x, y });
            };

            useEffect(() => {
                document.addEventListener('mouseup', handleMapUp);
                document.addEventListener('touchend', handleMapUp);
                return () => {
                    document.removeEventListener('mouseup', handleMapUp);
                    document.removeEventListener('touchend', handleMapUp);
                };
            }, []);

            // --- Actions ---
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                setCurrentFile(file);
                setIsProcessing(true);
                setPendingAnalysis(null);

                setTimeout(() => {
                    setPendingAnalysis(generateMockAnalysis());
                    setIsProcessing(false);
                }, 1500);
            };

            const saveLog = () => {
                if (!pendingAnalysis) return;

                const newLog = {
                    id: Date.now(),
                    timestamp: new Date().toLocaleString(),
                    fileName: currentFile?.name || 'Unknown File',
                    isCalibration: isCalibrationUpload,
                    analysis: pendingAnalysis,
                    location: { ...markerPos }
                };

                setLogs([newLog, ...logs]);
                setCurrentFile(null);
                setPendingAnalysis(null);
                
                if (isCalibrationUpload) {
                    setIsCalibrationUpload(false);
                    setNeedsCalibration(false);
                    startTimer();
                }

                setMarkerPos({ x: 50, y: 50 });
            };

            // --- Analytics Derivation ---
            const getZoneData = () => {
                const zones = { 'Bow': 0, 'Midship': 0, 'Stern': 0 };
                logs.forEach(log => {
                    if (log.location.y < 33) zones['Bow']++;
                    else if (log.location.y < 66) zones['Midship']++;
                    else zones['Stern']++;
                });
                const max = Math.max(...Object.values(zones), 1);
                return { zones, max };
            };
            const { zones: zoneCounts, max: maxZoneCount } = getZoneData();

            const getScoreColor = (score) => {
                if (score >= 7) return 'text-red-400';
                if (score >= 4) return 'text-amber-400';
                return 'text-emerald-400';
            };

            return (
                <div className="min-h-screen bg-slate-900 text-slate-200 font-sans selection:bg-cyan-900">
                    <header className="bg-slate-950 border-b border-slate-800 p-4 sticky top-0 z-50 shadow-md">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center space-x-3">
                                <div className="bg-cyan-600 p-2 rounded-lg">
                                    <Icon name="Anchor" className="text-white w-6 h-6" />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-bold text-white tracking-wider">ANCHOR</h1>
                                    <p className="text-xs text-cyan-500 uppercase font-semibold tracking-widest">Gait & Pressure Analytics</p>
                                </div>
                            </div>
                            
                            <div className="flex items-center space-x-6">
                                <div className={`flex items-center space-x-2 px-4 py-2 rounded-lg border ${needsCalibration ? 'bg-red-900/50 border-red-500 text-red-200 animate-pulse' : 'bg-slate-900 border-slate-700'}`}>
                                    <Icon name="Clock" className="w-5 h-5" />
                                    <span className="font-mono text-lg">{formatTime(timeLeft)}</span>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
                        <div className="lg:col-span-4 space-y-6">
                            
                            <section className="bg-slate-800 rounded-xl border border-slate-700 p-5 shadow-lg">
                                <h2 className="text-lg font-semibold text-white mb-4 flex items-center">
                                    <Icon name="RotateCcw" className="w-5 h-5 mr-2 text-cyan-400" />
                                    Calibration Schedule
                                </h2>
                                <div className="space-y-4">
                                    <div className="flex items-center justify-between">
                                        <label className="text-sm text-slate-400">Refresh Interval (Secs)</label>
                                        <input 
                                            type="number" 
                                            value={timerSeconds}
                                            onChange={(e) => setTimerSeconds(Number(e.target.value))}
                                            className="bg-slate-900 border border-slate-600 rounded px-3 py-1 w-20 text-center focus:outline-none focus:border-cyan-500"
                                            disabled={timerActive}
                                        />
                                    </div>
                                    <button 
                                        onClick={startTimer}
                                        className="w-full py-2 bg-slate-700 hover:bg-slate-600 active:bg-slate-500 rounded-lg transition-colors font-medium"
                                    >
                                        {timerActive ? 'Restart Timer' : 'Start Timer'}
                                    </button>

                                    {needsCalibration && (
                                        <div className="mt-4 p-3 bg-red-900/30 border border-red-800 rounded-lg flex items-start space-x-3">
                                            <Icon name="AlertTriangle" className="w-5 h-5 text-red-400 flex-shrink-0 mt-0.5" />
                                            <p className="text-sm text-red-200">
                                                Calibration required! Please upload a new baseline gait file.
                                            </p>
                                        </div>
                                    )}
                                </div>
                            </section>

                            <section className={`rounded-xl border p-5 shadow-lg transition-colors duration-300 ${isCalibrationUpload ? 'bg-cyan-900/20 border-cyan-700' : 'bg-slate-800 border-slate-700'}`}>
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-lg font-semibold text-white flex items-center">
                                        <Icon name="Activity" className="w-5 h-5 mr-2 text-cyan-400" />
                                        Data Ingestion
                                    </h2>
                                    {isCalibrationUpload && (
                                        <span className="text-xs bg-cyan-600 text-white px-2 py-1 rounded-full uppercase font-bold tracking-wider">Calibration Mode</span>
                                    )}
                                </div>

                                <div className="border-2 border-dashed border-slate-600 rounded-lg p-6 text-center hover:bg-slate-750 transition-colors relative">
                                    <input 
                                        type="file" 
                                        accept=".csv"
                                        onChange={handleFileUpload}
                                        className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                                    />
                                    <Icon name="Upload" className="w-8 h-8 text-slate-400 mx-auto mb-3" />
                                    <p className="text-sm font-medium text-slate-300">
                                        Drag & Drop CSV or <span className="text-cyan-400">Browse</span>
                                    </p>
                                    <p className="text-xs text-slate-500 mt-1">Pressure sensor readings (.csv)</p>
                                </div>

                                {currentFile && (
                                    <div className="mt-4 p-3 bg-slate-900 rounded-lg flex items-center justify-between border border-slate-700">
                                        <div className="flex items-center space-x-3 truncate">
                                            <Icon name="FileText" className="w-4 h-4 text-cyan-500 flex-shrink-0" />
                                            <span className="text-sm truncate">{currentFile.name}</span>
                                        </div>
                                        {isProcessing ? (
                                            <span className="text-xs text-cyan-400 animate-pulse flex items-center">
                                                <div className="w-3 h-3 border-2 border-cyan-400 border-t-transparent rounded-full animate-spin mr-2"></div>
                                                Processing...
                                            </span>
                                        ) : (
                                            <Icon name="CheckCircle2" className="w-5 h-5 text-emerald-500" />
                                        )}
                                    </div>
                                )}
                                
                                {!needsCalibration && !currentFile && (
                                    <label className="flex items-center space-x-2 mt-4 cursor-pointer text-sm text-slate-400 hover:text-slate-300">
                                        <input 
                                            type="checkbox" 
                                            checked={isCalibrationUpload}
                                            onChange={(e) => setIsCalibrationUpload(e.target.checked)}
                                            className="rounded border-slate-600 bg-slate-900 text-cyan-500 focus:ring-cyan-500 focus:ring-offset-slate-800"
                                        />
                                        <span>Mark next upload as Calibration</span>
                                    </label>
                                )}
                            </section>

                            {pendingAnalysis && !isProcessing && (
                                <section className="bg-slate-800 rounded-xl border border-slate-700 p-5 shadow-lg animate-in fade-in slide-in-from-bottom-4">
                                    <h3 className="text-sm text-slate-400 mb-2 uppercase tracking-wider font-semibold">Detected Pattern</h3>
                                    <div className={`text-xl font-bold mb-1 ${pendingAnalysis.severity === 'High' ? 'text-red-400' : pendingAnalysis.severity === 'Medium' ? 'text-amber-400' : 'text-emerald-400'}`}>
                                        {pendingAnalysis.type}
                                    </div>
                                    <div className="flex space-x-4 mb-2">
                                        <div className="text-sm text-slate-300">
                                            Risk: <span className={`font-bold ${getScoreColor(pendingAnalysis.riskScore)}`}>{pendingAnalysis.riskScore}/10</span>
                                        </div>
                                        <div className="text-sm text-slate-300">
                                            Fatigue: <span className={`font-bold ${getScoreColor(pendingAnalysis.fatigueScore)}`}>{pendingAnalysis.fatigueScore}/10</span>
                                        </div>
                                    </div>
                                    <p className="text-sm text-slate-300 mb-4">{pendingAnalysis.pressurePoint}</p>
                                    
                                    <div className="bg-slate-900 p-3 rounded border border-slate-700 mb-1">
                                        <p className="text-xs text-slate-400 mb-1">Next Step:</p>
                                        <p className="text-sm text-slate-200 flex items-start">
                                            <Icon name="Crosshair" className="w-4 h-4 mr-2 mt-0.5 text-cyan-500 flex-shrink-0" />
                                            Drag the marker on the map to set the location, then click "Log Event Here" under the map to record and publish the alert.
                                        </p>
                                    </div>
                                </section>
                            )}

                        </div>

                        <div className="lg:col-span-8 space-y-6">
                            <section className="bg-slate-800 rounded-xl border border-slate-700 p-5 shadow-lg flex flex-col h-[400px]">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-lg font-semibold text-white flex items-center">
                                        <Icon name="Crosshair" className="w-5 h-5 mr-2 text-cyan-400" />
                                        Location Designator
                                    </h2>
                                    <p className="text-sm text-slate-400">Drag marker to set recording location</p>
                                </div>
                                
                                <div className="flex-1 relative bg-slate-900 rounded-lg border border-slate-700 overflow-hidden select-none">
                                    <div className="absolute inset-0 opacity-20" 
                                         style={{ backgroundImage: 'linear-gradient(#334155 1px, transparent 1px), linear-gradient(90deg, #334155 1px, transparent 1px)', backgroundSize: '20px 20px' }}>
                                    </div>

                                    <div 
                                        ref={mapRef}
                                        className="absolute inset-0 cursor-crosshair touch-none"
                                        onMouseDown={handleMapDown}
                                        onMouseMove={handleMapMove}
                                        onTouchStart={handleMapDown}
                                        onTouchMove={handleMapMove}
                                    >
                                        <svg className="w-full h-full drop-shadow-2xl" viewBox="0 0 200 600" preserveAspectRatio="xMidYMid meet">
                                            <path 
                                                d="M 100 20 C 40 100 20 200 20 500 L 20 580 C 50 595 150 595 180 580 L 180 500 C 180 200 160 100 100 20 Z" 
                                                fill="#1e293b" 
                                                stroke="#3b82f6" 
                                                strokeWidth="4"
                                                className="opacity-80"
                                            />
                                            <line x1="25" y1="200" x2="175" y2="200" stroke="#334155" strokeWidth="2" />
                                            <line x1="20" y1="400" x2="180" y2="400" stroke="#334155" strokeWidth="2" />
                                            <line x1="100" y1="30" x2="100" y2="580" stroke="#334155" strokeWidth="1" strokeDasharray="5,5" />
                                        </svg>

                                        {logs.map(log => (
                                            <div 
                                                key={`log-marker-${log.id}`}
                                                className="absolute w-6 h-6 -ml-3 -mt-6 transform scale-100 transition-transform hover:scale-125 cursor-help"
                                                style={{ left: `${log.location.x}%`, top: `${log.location.y}%` }}
                                                title={`${log.analysis.type} logged at ${log.timestamp}`}
                                            >
                                                <Icon name="MapPin" className="w-6 h-6 text-red-500 drop-shadow-[0_0_8px_rgba(239,68,68,0.8)] fill-red-900" />
                                            </div>
                                        ))}

                                        <div 
                                            className={`absolute w-6 h-6 -ml-3 -mt-6 transform transition-transform ${isDragging ? 'scale-125' : 'scale-100 hover:scale-110'} ${pendingAnalysis ? 'z-10 animate-bounce' : ''}`}
                                            style={{ left: `${markerPos.x}%`, top: `${markerPos.y}%` }}
                                        >
                                            <Icon name="MapPin" className="w-6 h-6 text-cyan-400 drop-shadow-[0_0_8px_rgba(34,211,238,0.8)] fill-cyan-900" />
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="mt-4 flex justify-between items-center bg-slate-900/80 p-3 rounded-lg border border-slate-700">
                                    <div className="flex space-x-4 text-xs font-mono text-slate-400">
                                        <span>LAT: {(markerPos.y * 0.9).toFixed(2)}</span>
                                        <span>LONG: {(markerPos.x * 0.9).toFixed(2)}</span>
                                    </div>
                                    <button 
                                        onClick={saveLog}
                                        disabled={!pendingAnalysis}
                                        className={`px-4 py-2 rounded-lg font-medium shadow-lg transition-all flex items-center ${
                                            pendingAnalysis 
                                                ? 'bg-cyan-600 hover:bg-cyan-500 text-white shadow-cyan-900/50' 
                                                : 'bg-slate-800 text-slate-500 cursor-not-allowed border border-slate-700'
                                        }`}
                                    >
                                        <Icon name="MapPin" className="w-4 h-4 mr-2" />
                                        Log Event Here
                                    </button>
                                </div>
                            </section>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <section className="bg-slate-800 rounded-xl border border-slate-700 p-5 shadow-lg h-[400px] flex flex-col">
                                    <h2 className="text-lg font-semibold text-white mb-4 flex items-center border-b border-slate-700 pb-2">
                                        <Icon name="AlertTriangle" className="w-5 h-5 mr-2 text-red-400" />
                                        Published Alerts
                                    </h2>
                                    <div className="flex-1 overflow-y-auto pr-2 space-y-3 custom-scrollbar">
                                        {logs.filter(log => log.analysis.severity !== 'Low').length === 0 ? (
                                            <div className="h-full flex flex-col items-center justify-center text-slate-500">
                                                <Icon name="CheckCircle2" className="w-10 h-10 mb-2 opacity-50" />
                                                <p>No actionable alerts</p>
                                            </div>
                                        ) : (
                                            logs.filter(log => log.analysis.severity !== 'Low').map((log) => (
                                                <div key={`alert-${log.id}`} className={`p-4 rounded-lg border ${log.analysis.severity === 'High' ? 'bg-red-900/20 border-red-800/50' : 'bg-amber-900/20 border-amber-800/50'}`}>
                                                    <div className="flex justify-between items-start mb-2">
                                                        <span className={`text-sm font-bold ${log.analysis.severity === 'High' ? 'text-red-400' : 'text-amber-400'}`}>
                                                            {log.analysis.type}
                                                        </span>
                                                        <span className="text-xs text-slate-400 font-mono">{log.timestamp.split(',')[1]}</span>
                                                    </div>
                                                    <div className="flex space-x-3 mb-2 text-xs">
                                                        <span className="bg-slate-950 px-2 py-1 rounded border border-slate-700">Risk: <span className={`font-bold ${getScoreColor(log.analysis.riskScore)}`}>{log.analysis.riskScore}/10</span></span>
                                                        <span className="bg-slate-950 px-2 py-1 rounded border border-slate-700">Fatigue: <span className={`font-bold ${getScoreColor(log.analysis.fatigueScore)}`}>{log.analysis.fatigueScore}/10</span></span>
                                                    </div>
                                                    <p className="text-sm text-slate-300 mb-3">{log.analysis.pressurePoint}</p>
                                                    <div className="bg-slate-900/50 rounded p-2 border border-slate-700/50">
                                                        <span className="text-xs uppercase tracking-wider text-cyan-500 font-semibold block mb-1">Immediate Action:</span>
                                                        <p className="text-sm text-slate-200">{log.analysis.remediation}</p>
                                                    </div>
                                                    <div className="mt-3 text-xs text-slate-500 flex items-center">
                                                        <Icon name="MapPin" className="w-3 h-3 mr-1" />
                                                        Loc: [{log.location.x.toFixed(0)}, {log.location.y.toFixed(0)}]
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </section>

                                <section className="bg-slate-800 rounded-xl border border-slate-700 p-5 shadow-lg h-[400px] flex flex-col">
                                    <h2 className="text-lg font-semibold text-white mb-4 flex items-center border-b border-slate-700 pb-2">
                                        <Icon name="FileText" className="w-5 h-5 mr-2 text-cyan-400" />
                                        Gait Log History
                                    </h2>
                                    <div className="flex-1 overflow-y-auto pr-2 space-y-2 custom-scrollbar">
                                        {logs.length === 0 ? (
                                            <div className="h-full flex flex-col items-center justify-center text-slate-500">
                                                <p>No records found</p>
                                            </div>
                                        ) : (
                                            logs.map((log) => (
                                                <div key={log.id} className="flex flex-col bg-slate-900/50 border border-slate-700 rounded-lg p-3 hover:bg-slate-700/50 transition-colors">
                                                    <div className="flex justify-between items-center mb-1">
                                                        <div className="flex items-center space-x-2">
                                                            <span className="text-sm font-medium text-slate-200">{log.fileName}</span>
                                                            {log.isCalibration && (
                                                                <span className="bg-cyan-900 text-cyan-200 text-[10px] px-2 py-0.5 rounded border border-cyan-700">CALIBRATED</span>
                                                            )}
                                                        </div>
                                                        <span className="text-xs text-slate-400 font-mono">{log.timestamp.split(',')[1]}</span>
                                                    </div>
                                                    <div className="flex justify-between items-center mt-2">
                                                        <span className={`text-xs px-2 py-1 rounded-full border ${
                                                            log.analysis.severity === 'High' ? 'bg-red-900/30 text-red-400 border-red-800' : 
                                                            log.analysis.severity === 'Medium' ? 'bg-amber-900/30 text-amber-400 border-amber-800' : 
                                                            'bg-emerald-900/30 text-emerald-400 border-emerald-800'
                                                        }`}>
                                                            {log.analysis.type}
                                                        </span>
                                                        <div className="flex space-x-2 text-[10px] font-mono mt-1 md:mt-0">
                                                            <span className="text-slate-400">R:{log.analysis.riskScore}</span>
                                                            <span className="text-slate-400">F:{log.analysis.fatigueScore}</span>
                                                        </div>
                                                        <span className="text-xs text-slate-500 font-mono">
                                                            X:{log.location.x.toFixed(0)} Y:{log.location.y.toFixed(0)}
                                                        </span>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </section>

                            </div>

                            <section className="bg-slate-800 rounded-xl border border-slate-700 p-5 shadow-lg flex flex-col">
                                <h2 className="text-lg font-semibold text-white mb-4 flex items-center border-b border-slate-700 pb-2">
                                    <Icon name="BarChart3" className="w-5 h-5 mr-2 text-cyan-400" />
                                    Incident Hotspots by Ship Zone
                                </h2>
                                <div className="flex flex-col space-y-4 pt-2">
                                    {Object.entries(zoneCounts).map(([zone, count]) => (
                                        <div key={zone} className="flex items-center">
                                            <span className="w-24 text-sm text-slate-400 font-medium">{zone}</span>
                                            <div className="flex-1 h-6 bg-slate-900 rounded-full overflow-hidden border border-slate-700 mx-3">
                                                <div 
                                                    className="h-full bg-cyan-600 transition-all duration-500 relative"
                                                    style={{ width: `${count === 0 ? 0 : Math.max(2, (count / maxZoneCount) * 100)}%` }}
                                                >
                                                    <div className="absolute inset-0 bg-gradient-to-r from-transparent to-cyan-400 opacity-30"></div>
                                                </div>
                                            </div>
                                            <span className="w-8 text-right text-sm font-bold text-white">{count}</span>
                                        </div>
                                    ))}
                                </div>
                            </section>

                        </div>
                    </main>

                    <style dangerouslySetInnerHTML={{__html: `
                        .custom-scrollbar::-webkit-scrollbar {
                            width: 6px;
                        }
                        .custom-scrollbar::-webkit-scrollbar-track {
                            background: #1e293b;
                            border-radius: 4px;
                        }
                        .custom-scrollbar::-webkit-scrollbar-thumb {
                            background: #475569;
                            border-radius: 4px;
                        }
                        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
                            background: #64748b;
                        }
                    `}} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
